services:
  vimmo:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      # ホストの~/.config/nvimで上書きしたい場合はコメントを外す
      # - ~/.config/nvim:/root/.config/nvim
    command: sleep infinity
    tty: true
    stdin_open: true

  test:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "ln -sf /usr/local/bin/nvim /usr/local/bin/vim && python tests/run_tests.py"

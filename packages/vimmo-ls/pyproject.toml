[project]
name = "vimmo-ls"
version = "0.1.0"
description = "VimMo Language Server Protocol (LSP) Server"
dependencies = ["pygls>=1.3.1", "vimmo-core"]

[project.scripts]
vimmo-ls = "vimmo_ls.server:main"

[project.optional-dependencies]
test = ["pytest>=8"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
